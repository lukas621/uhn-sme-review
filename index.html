<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Review</title>
<link rel="stylesheet" href="css/review.css">
</head>
<body>

<header class="app-header">
  <h1>Course Review</h1>
  <div class="header-right">
    <select id="guideSelector"></select>
    <input type="text" id="reviewerInput" placeholder="Your name">
  </div>
</header>

<div class="split-layout">
  <!-- Left: Course preview -->
  <div class="course-panel">
    <iframe id="courseIframe" src="/course/index.html"></iframe>
  </div>

  <!-- Resize handle -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- Right: Feedback panel -->
  <div class="feedback-panel" id="feedbackPanel">
    <div class="panel-inner">
      <div class="summary-row">
        <div class="summary-pill"><span class="dot dot-approved"></span><span id="summaryApproved">0</span> Approved</div>
        <div class="summary-pill"><span class="dot dot-needs_changes"></span><span id="summaryChanges">0</span> Changes</div>
        <div class="summary-pill"><span class="dot dot-flagged"></span><span id="summaryFlagged">0</span> Flagged</div>
        <div class="summary-pill"><span class="dot dot-pending"></span><span id="summaryPending">23</span> Pending</div>
        <button class="export-btn" onclick="exportCSV()">Export</button>
      </div>

      <div id="slideList" class="slide-list"></div>
    </div>
  </div>
</div>

<script src="js/supabase-config.js"></script>
<script src="js/slide-meta.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/review-app.js"></script>
<script>
// Resize handle
(function() {
  var handle = document.getElementById('resizeHandle');
  var panel = document.getElementById('feedbackPanel');
  var dragging = false;
  handle.addEventListener('mousedown', function(e) {
    e.preventDefault(); dragging = true;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var w = window.innerWidth - e.clientX;
    if (w < 280) w = 280;
    if (w > 600) w = 600;
    panel.style.width = w + 'px';
  });
  document.addEventListener('mouseup', function() {
    dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// Export CSV
function exportCSV() {
  var gid = document.getElementById('guideSelector').value || 1;
  var guideMeta = SLIDE_META[gid];
  if (!guideMeta) return;
  var rows = [['Slide','Screen','Title','Status','Comment','Reviewer','Date']];
  var raw = localStorage.getItem('sme_feedback_data');
  var data = raw ? JSON.parse(raw) : {};
  guideMeta.slides.forEach(function(s) {
    var entries = data[gid + '-' + s.num] || [];
    if (entries.length === 0) {
      rows.push([s.num, s.screen, s.title, 'pending', '', '', '']);
    } else {
      entries.forEach(function(e) {
        rows.push([s.num, s.screen, s.title, e.status, '"'+(e.comment||'').replace(/"/g,'""')+'"', e.reviewer, e.updated_at||'']);
      });
    }
  });
  var csv = rows.map(function(r){return r.join(',');}).join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'feedback-guide-' + gid + '.csv'; a.click();
}
</script>

</body>
</html>
