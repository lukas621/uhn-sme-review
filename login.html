<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Review — Sign In</title>
<style>
  :root {
    --bg: #f5f5f7;
    --text: #1d1d1f;
    --text-secondary: #86868b;
    --blue: #0071e3;
    --border: #d2d2d7;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-card {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 48px 40px;
    width: 400px;
    max-width: 90vw;
    text-align: center;
  }

  .logo {
    width: 48px;
    height: 48px;
    background: var(--text);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }
  .logo svg { width: 28px; height: 28px; }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .field {
    text-align: left;
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: var(--font);
    font-size: 16px;
    color: var(--text);
    background: #fff;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
  }
  .field input::placeholder { color: #c7c7cc; }

  .role-pills {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }
  .role-pill {
    flex: 1;
    padding: 10px 0;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: #fff;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .role-pill:hover { border-color: var(--blue); color: var(--text); }
  .role-pill.selected {
    border-color: var(--blue);
    background: rgba(0,113,227,0.06);
    color: var(--blue);
    font-weight: 600;
  }

  .sign-in-btn {
    width: 100%;
    padding: 14px 0;
    background: var(--blue);
    color: #fff;
    border: 0;
    border-radius: 12px;
    font-family: var(--font);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 24px;
    transition: background 0.2s;
  }
  .sign-in-btn:hover { background: #005bb5; }
  .sign-in-btn:disabled {
    background: #c7c7cc;
    cursor: not-allowed;
  }

  .error-msg {
    font-size: 13px;
    color: #ff3b30;
    margin-top: 8px;
    display: none;
  }

  .footer {
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
    </svg>
  </div>

  <h1>Course Review</h1>
  <p class="subtitle">Sign in to review and provide feedback on eLearning courses.</p>

  <div class="field">
    <label>Your Name</label>
    <input type="text" id="nameInput" placeholder="Enter your full name" autocomplete="name">
  </div>

  <div class="field">
    <label>Your Role</label>
    <div class="role-pills">
      <button class="role-pill" data-role="SME">SME</button>
      <button class="role-pill" data-role="Designer">Designer</button>
      <button class="role-pill" data-role="Manager">Manager</button>
      <button class="role-pill" data-role="Other">Other</button>
    </div>
  </div>

  <div class="field">
    <label>Course</label>
    <select id="courseSelect">
      <option value="1">Guide 01: Foundations of Disability, Inclusion & Accessible Design</option>
    </select>
  </div>

  <div class="error-msg" id="errorMsg">Please enter your name and select a role.</div>

  <button class="sign-in-btn" id="signInBtn">Continue to Review</button>

  <p class="footer">University Health Network · Accessibility First Series</p>
</div>

<script>
(function() {
  var selectedRole = '';
  var nameInput = document.getElementById('nameInput');
  var signInBtn = document.getElementById('signInBtn');
  var errorMsg = document.getElementById('errorMsg');
  var courseSelect = document.getElementById('courseSelect');

  // Role pills
  document.querySelectorAll('.role-pill').forEach(function(pill) {
    pill.addEventListener('click', function() {
      document.querySelectorAll('.role-pill').forEach(function(p) { p.classList.remove('selected'); });
      pill.classList.add('selected');
      selectedRole = pill.getAttribute('data-role');
      errorMsg.style.display = 'none';
    });
  });

  // Check returning user
  var savedName = localStorage.getItem('sme_reviewer_name');
  var savedRole = localStorage.getItem('sme_reviewer_role');
  if (savedName) nameInput.value = savedName;
  if (savedRole) {
    selectedRole = savedRole;
    var pill = document.querySelector('[data-role="' + savedRole + '"]');
    if (pill) pill.classList.add('selected');
  }

  // Sign in
  signInBtn.addEventListener('click', function() {
    var name = nameInput.value.trim();
    if (!name || !selectedRole) {
      errorMsg.style.display = 'block';
      return;
    }

    localStorage.setItem('sme_reviewer_name', name);
    localStorage.setItem('sme_reviewer_role', selectedRole);
    localStorage.setItem('sme_review_guide', courseSelect.value);

    // Route based on role
    if (selectedRole === 'Designer') {
      window.location.href = 'dashboard.html';
    } else {
      window.location.href = 'index.html';
    }
  });

  // Enter key
  nameInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') signInBtn.click();
  });
})();
</script>

</body>
</html>
